version: "3.9"

services:
    postgres:
        image: postgres:15

        container_name: inventory_postgres

        restart: always

        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: inventorydb

        ports:
            - "5432:5432"

        volumes:
            - postgres_data:/var/lib/postgresql/data

    backend:
        build:
            context: ./backend

        container_name: inventory_backend

        depends_on:
            - postgres

        environment:
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventorydb

        ports:
            - "8000:8000"

    frontend:
        build:
            context: ./frontend

        container_name: inventory_frontend

        depends_on:
            - backend

        environment:
            VITE_API_URL: http://backend:8000

        ports:
            - "3000:3000"

volumes:
    postgres_data:
